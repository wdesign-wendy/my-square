<!DOCTYPE html>
<html class="light" lang="ko">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>My Square - Smart Expense Tracker</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link rel="manifest" href="./manifest.json">
    <link rel="apple-touch-icon" href="./icon512.png">
    <meta name="theme-color" content="#ffffff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="My Square">
    <link as="style" crossorigin="" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard-dynamic-subset.min.css" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#FF6B00",
                        "primary-container": "#ffe8d6",
                        "on-primary": "#ffffff",
                        "on-primary-container": "#FF6B00",
                        "secondary": "#222222",
                        "secondary-container": "#f5f5f5",
                        "on-secondary": "#ffffff",
                        "on-secondary-container": "#222222",
                        "surface": "#ffffff",
                        "surface-variant": "#f5f5f7",
                        "on-surface": "#1a1a1a",
                        "on-surface-variant": "#666666",
                        "outline": "#e5e5e7",
                        "outline-variant": "#f0f0f3",
                        "surface-container-lowest": "#ffffff",
                        "surface-container-low": "#f9f9fb",
                        "surface-container": "#f4f4f6",
                        "surface-container-high": "#ededf0",
                        "surface-container-highest": "#e2e2e7",
                        "secondary-fixed": "#FF6B00",
                        "tertiary-container": "#fff0e5",
                        "on-tertiary-container": "#FF6B00",
                    },
                    fontFamily: {
                        "sans": ['Manrope', 'Pretendard Variable', 'sans-serif'],
                        "headline": ['Manrope', 'Pretendard Variable', 'sans-serif'],
                        "body": ['Manrope', 'Pretendard Variable', 'sans-serif'],
                        "label": ['Manrope', 'Pretendard Variable', 'sans-serif']
                    },
                    borderRadius: {"DEFAULT": "0.375rem", "md": "0.375rem", "lg": "0.5rem", "xl": "0.75rem", "2xl": "1rem", "3xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Manrope', 'Pretendard Variable', sans-serif;
            -webkit-font-smoothing: antialiased;
            letter-spacing: -0.02em;
            min-height: max(884px, 100dvh);
        }
        .donut-segment {
            transition: stroke-dashoffset 1s ease-in-out, stroke 0.3s ease;
        }
    </style>
    <!-- Core Libraries -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/history@5/umd/history.development.js"></script>
    <script src="https://unpkg.com/react-router@6.3.0/umd/react-router.development.js"></script>
    <script src="https://unpkg.com/react-router-dom@6.3.0/umd/react-router-dom.development.js"></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
    <!-- Supabase JS Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-surface text-on-surface">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, createContext, useContext } = React;
        const { createRoot } = ReactDOM;
        const { MemoryRouter, Routes, Route, Link, useNavigate, useLocation } = ReactRouterDOM;

        // --- Context & State ---
        const DataContext = createContext(null);
        
        const formatCurrency = (val) => new Intl.NumberFormat('ko-KR').format(val || 0);

        const getBillingMonth = (dateStr) => {
            const date = new Date(dateStr);
            const year = date.getFullYear();
            const month = date.getMonth();
            const day = date.getDate();
            if (day >= 5) {
                return year * 12 + month + 1;
            } else {
                return year * 12 + month;
            }
        };

        // Supabase Client Initialization
        const { createClient } = supabase;
        const supabaseUrl = 'https://akhucfammjztmkkanrgx.supabase.co';
        const supabaseKey = 'sb_publishable_vdE2O8Bwg-ScKeFDRCMl8g_ljs_AdwP';
        const supabaseClient = createClient(supabaseUrl, supabaseKey);

        const DataProvider = ({ children }) => {
            const defaultExpenses = [];

            const [expenses, setExpenses] = useState(() => {
                const saved = localStorage.getItem('financier_expenses');
                return saved ? JSON.parse(saved) : defaultExpenses;
            });

            const defaultCards = [
                { id: 'c1', name: '현대 제로', nickname: '기본 할인 카드' },
                { id: 'c2', name: '신한 Deep', nickname: '' },
                { id: 'c3', name: '국민 Star', nickname: '' },
            ];

            const [cards, setCards] = useState(() => {
                const saved = localStorage.getItem('financier_cards');
                return saved ? JSON.parse(saved) : defaultCards;
            });

            const defaultCategories = ['식비', '교통', '전자제품', '가구', '기타'];
            const [categories, setCategories] = useState(() => {
                const saved = localStorage.getItem('financier_categories');
                return saved ? JSON.parse(saved) : defaultCategories;
            });

            // New states for Assets & Budget Diary
            const defaultAssets = [
                { id: 'a1', name: '토스 키워봐요 적금', amount: 5200000, memo: '260801 만기' },
                { id: 'a2', name: '토스 굴비 적금', amount: 900000, memo: '260825 만기' },
                { id: 'a3', name: '토스 모으기통장', amount: 1300000, memo: '' },
                { id: 'a4', name: '국민 주택청약', amount: 3600000, memo: '240111 가입(26.07 기준 31회차 납입)' },
                { id: 'a5', name: '전세 보증금', amount: 5450000, memo: '' },
                { id: 'a6', name: '아버님 용돈', amount: 500000, memo: '' },
            ];

            const defaultSavingsGoal = {
                targetAmount: 19000000,
                targetDate: '2027-07-01',
                memo: '매달 20만원 저축'
            };

            const defaultBudgetSettings = {
                monthlyLimit: 600000,
                fixedCosts: 850000,
                fixedCostsMemo: '38(집세)+20(반차)+10(보험,교통)... = 85만원'
            };

            const defaultBudgetLogs = [
                { id: 'b1', date: '2026-07-13', title: '생활비 지출', amount: 400450 },
                { id: 'b2', date: '2026-07-14', title: '양쯔깐루', amount: 10900 },
                { id: 'b3', date: '2026-07-14', title: '선풍기택배', amount: 3400 },
                { id: 'b4', date: '2026-07-14', title: '아이폰할부', amount: 80000 },
                { id: 'b5', date: '2026-07-15', title: '애플', amount: 1100 },
                { id: 'b6', date: '2026-07-15', title: '속눈썹예약', amount: 20000 },
                { id: 'b7', date: '2026-07-15', title: '삼성실비', amount: 18440 },
                { id: 'b8', date: '2026-07-16', title: '컴포즈커피', amount: 2900 }
            ];

            const [assets, setAssets] = useState(() => {
                const saved = localStorage.getItem('financier_assets');
                return saved ? JSON.parse(saved) : defaultAssets;
            });

            const [savingsGoal, setSavingsGoal] = useState(() => {
                const saved = localStorage.getItem('financier_savings_goal');
                return saved ? JSON.parse(saved) : defaultSavingsGoal;
            });

            const [budgetSettings, setBudgetSettings] = useState(() => {
                const saved = localStorage.getItem('financier_budget_settings');
                return saved ? JSON.parse(saved) : defaultBudgetSettings;
            });

            const [budgetLogs, setBudgetLogs] = useState(() => {
                const saved = localStorage.getItem('financier_budget_logs');
                return saved ? JSON.parse(saved) : defaultBudgetLogs;
            });

            const [user, setUser] = useState(null);
            const [hasSynced, setHasSynced] = useState(false);
            const [isLoading, setIsLoading] = useState(true);

            // Auth State Change listener
            useEffect(() => {
                supabaseClient.auth.getSession().then(({ data: { session } }) => {
                    setUser(session && session.user ? session.user : null);
                    setIsLoading(false);
                });

                const { data: { subscription } } = supabaseClient.auth.onAuthStateChange((_event, session) => {
                    setUser(session && session.user ? session.user : null);
                });

                return () => subscription.unsubscribe();
            }, []);

            // Fetch cloud data when logged in
            useEffect(() => {
                if (!user) {
                    setHasSynced(false);
                    return;
                }

                const fetchUserData = async () => {
                    setIsLoading(true);
                    const { data, error } = await supabaseClient
                        .from('user_data')
                        .select('data')
                        .eq('user_id', user.id)
                        .single();

                    if (error && error.code !== 'PGRST116') {
                        console.error('Error fetching user data:', error);
                        setHasSynced(true);
                        setIsLoading(false);
                        return;
                    }

                    if (data && data.data && Object.keys(data.data).length > 0) {
                        if (data.data.expenses) setExpenses(data.data.expenses);
                        if (data.data.cards) setCards(data.data.cards);
                        if (data.data.categories) setCategories(data.data.categories);
                        if (data.data.assets) setAssets(data.data.assets);
                        if (data.data.savingsGoal) setSavingsGoal(data.data.savingsGoal);
                        if (data.data.budgetSettings) setBudgetSettings(data.data.budgetSettings);
                        if (data.data.budgetLogs) setBudgetLogs(data.data.budgetLogs);
                    } else {
                        // First-time login: sync existing local storage data to cloud
                        await supabaseClient
                            .from('user_data')
                            .upsert({
                                user_id: user.id,
                                data: { expenses, cards, categories, assets, savingsGoal, budgetSettings, budgetLogs },
                                updated_at: new Date().toISOString()
                            });
                    }
                    setHasSynced(true);
                    setIsLoading(false);
                };

                fetchUserData();
            }, [user]);

            // Save to localStorage (if offline/guest) or Supabase (if logged in)
            useEffect(() => {
                if (!user) {
                    localStorage.setItem('financier_expenses', JSON.stringify(expenses));
                    localStorage.setItem('financier_cards', JSON.stringify(cards));
                    localStorage.setItem('financier_categories', JSON.stringify(categories));
                    localStorage.setItem('financier_assets', JSON.stringify(assets));
                    localStorage.setItem('financier_savings_goal', JSON.stringify(savingsGoal));
                    localStorage.setItem('financier_budget_settings', JSON.stringify(budgetSettings));
                    localStorage.setItem('financier_budget_logs', JSON.stringify(budgetLogs));
                    return;
                }

                if (!hasSynced) return; // Prevent overwriting cloud data during initial sync

                const delayDebounce = setTimeout(async () => {
                    const { error } = await supabaseClient
                        .from('user_data')
                        .upsert({
                            user_id: user.id,
                            data: { expenses, cards, categories, assets, savingsGoal, budgetSettings, budgetLogs },
                            updated_at: new Date().toISOString()
                        });
                    if (error) console.error('Failed to sync to cloud:', error);
                }, 1000);

                return () => clearTimeout(delayDebounce);
            }, [expenses, cards, categories, assets, savingsGoal, budgetSettings, budgetLogs, user, hasSynced]);

            const addExpense = (exp) => setExpenses(prev => [...prev, exp]);
            const updateExpense = (id, newExp) => setExpenses(prev => prev.map(e => e.id === id ? newExp : e));
            const deleteExpense = (id) => setExpenses(prev => prev.filter(e => e.id !== id));

            const handleKakaoLogin = async () => {
                const { error } = await supabaseClient.auth.signInWithOAuth({
                    provider: 'kakao',
                    options: {
                        redirectTo: window.location.origin
                    }
                });
                if (error) console.error('Kakao login failed:', error);
            };

            const handleLogout = async () => {
                await supabaseClient.signOut || await supabaseClient.auth.signOut();
                const localExpenses = localStorage.getItem('financier_expenses');
                setExpenses(localExpenses ? JSON.parse(localExpenses) : defaultExpenses);
                const localCards = localStorage.getItem('financier_cards');
                setCards(localCards ? JSON.parse(localCards) : defaultCards);
                const localCategories = localStorage.getItem('financier_categories');
                setCategories(localCategories ? JSON.parse(localCategories) : defaultCategories);
                
                const localAssets = localStorage.getItem('financier_assets');
                setAssets(localAssets ? JSON.parse(localAssets) : defaultAssets);
                const localGoal = localStorage.getItem('financier_savings_goal');
                setSavingsGoal(localGoal ? JSON.parse(localGoal) : defaultSavingsGoal);
                const localSettings = localStorage.getItem('financier_budget_settings');
                setBudgetSettings(localSettings ? JSON.parse(localSettings) : defaultBudgetSettings);
                const localLogs = localStorage.getItem('financier_budget_logs');
                setBudgetLogs(localLogs ? JSON.parse(localLogs) : defaultBudgetLogs);
            };

            return (
                <DataContext.Provider value={{ 
                    expenses, addExpense, updateExpense, deleteExpense, 
                    cards, setCards, categories, setCategories, 
                    assets, setAssets, savingsGoal, setSavingsGoal, 
                    budgetSettings, setBudgetSettings, budgetLogs, setBudgetLogs,
                    user, handleLogout, handleKakaoLogin, isLoading 
                }}>
                    {children}
                </DataContext.Provider>
            );
        };

        // --- Shared Components ---
        const TopAppBar = ({ title, showBack = false }) => {
            const navigate = useNavigate();
            return (
                <header className="fixed top-0 w-full z-50 bg-surface/85 backdrop-blur-xl border-b border-outline-variant">
                    <div className="flex justify-between items-center px-6 h-16 w-full max-w-md mx-auto">
                        <div className="flex items-center gap-3">
                            {showBack ? (
                                <button onClick={() => navigate(-1)} className="material-symbols-outlined text-primary hover:opacity-80 transition-opacity">arrow_back</button>
                            ) : (
                                <span className="material-symbols-outlined text-primary">account_balance_wallet</span>
                            )}
                            <h1 className="font-headline font-extrabold text-base tracking-tight text-on-surface">{title}</h1>
                        </div>
                        <div className="flex items-center gap-3">
                            <Link to="/add-expense" className="bg-primary text-on-primary px-4 py-1.5 rounded-full text-xs font-bold hover:opacity-90 active:scale-95 transition-all shadow-sm shadow-primary/10">
                                지출 추가
                            </Link>
                        </div>
                    </div>
                </header>
            );
        };

        const BottomNavBar = () => {
            const location = useLocation();
            return (
                <nav className="fixed bottom-6 left-6 right-6 z-50 rounded-[2rem] bg-surface/90 backdrop-blur-xl border border-outline shadow-lg max-w-sm mx-auto">
                    <div className="flex justify-around items-center px-2 py-3 h-20">
                        {['/', '/timeline', '/asset', '/archive'].map((path) => {
                            const isActive = location.pathname === path;
                            const label = path === '/' ? '대시보드' : path === '/timeline' ? '타임라인' : path === '/asset' ? '자산' : '아카이브';
                            const icon = path === '/' ? 'dashboard' : path === '/timeline' ? 'event_repeat' : path === '/asset' ? 'savings' : 'inventory_2';
                            return (
                                <Link key={path} to={path} className="flex-1 flex flex-col items-center justify-center h-full">
                                    <div className={`flex flex-col items-center justify-center w-[4.5rem] py-2 rounded-2xl transition-all ${isActive ? 'bg-surface-container-high text-primary font-bold shadow-sm' : 'text-on-surface-variant opacity-60 hover:text-primary'}`}>
                                        <span className="material-symbols-outlined" style={{fontVariationSettings: isActive ? "'FILL' 1" : "'FILL' 0"}}>{icon}</span>
                                        <span className="font-bold text-[9px] uppercase tracking-widest mt-1">{label}</span>
                                    </div>
                                </Link>
                            );
                        })}
                    </div>
                </nav>
            );
        };

        // --- Screens ---

        // Screen 3: Dashboard
        const DashboardPage = () => {
            const { expenses, categories } = useContext(DataContext);
            const now = new Date();
            const currentYear = now.getFullYear();
            const currentMonth = now.getMonth();
            
            const nextMonthDate = new Date(currentYear, currentMonth + 1, 1);
            const nextYearNum = nextMonthDate.getFullYear();
            const nextMonthNum = nextMonthDate.getMonth();

            const [sortMode, setSortMode] = useState('balance');
            const currentMonths = currentYear * 12 + currentMonth;

            const activeInstallments = expenses.filter(exp => {
                if (!exp.isInstallment) return false;
                const billingMonth = getBillingMonth(exp.date);
                const purchaseDate = new Date(exp.date);
                const purchaseMonth = purchaseDate.getFullYear() * 12 + purchaseDate.getMonth();
                return currentMonths >= purchaseMonth && currentMonths < billingMonth + exp.months;
            }).map(exp => {
                const billingMonth = getBillingMonth(exp.date);
                const paidMonths = Math.max(0, currentMonths - billingMonth + 1);
                const remainingBalance = exp.amount - (exp.monthlyAmount * paidMonths);
                const endMonths = billingMonth + exp.months - 1;
                const endDateObj = new Date(Math.floor(endMonths / 12), endMonths % 12 + 1, 0);
                const endDateStr = `${endDateObj.getFullYear()}년 ${endDateObj.getMonth() + 1}월`;
                return { ...exp, paidMonths, remainingBalance, progressPercent: (paidMonths / exp.months) * 100, endDateStr, endMonths };
            }).sort((a,b) => {
                if (sortMode === 'balance') return b.remainingBalance - a.remainingBalance;
                else return a.endMonths - b.endMonths;
            });

            const activeTotalBalance = activeInstallments.reduce((acc, exp) => acc + Math.max(0, exp.remainingBalance), 0);

            const getMonthStats = (year, month) => {
                let lumpSum = 0;
                let installment = 0;
                const categoryStats = {};
                categories.forEach(cat => categoryStats[cat] = 0);
                const cardStats = {};

                expenses.forEach(exp => {
                    const billingMonth = getBillingMonth(exp.date);
                    const targetMonths = year * 12 + month;
                    let allocated = 0;
                    
                    if (!exp.isInstallment && billingMonth === targetMonths) {
                        allocated = exp.amount;
                        lumpSum += exp.amount;
                    } else if (exp.isInstallment) {
                        if (targetMonths >= billingMonth && targetMonths < billingMonth + exp.months) {
                            allocated = exp.monthlyAmount;
                            installment += exp.monthlyAmount;
                        }
                    }
                    
                    if (allocated > 0) {
                        const cat = categoryStats[exp.category] !== undefined ? exp.category : '기타';
                        if (categoryStats[cat] === undefined) categoryStats[cat] = 0;
                        categoryStats[cat] += allocated;

                        const c = exp.card || '기타';
                        if (!cardStats[c]) cardStats[c] = 0;
                        cardStats[c] += allocated;
                    }
                });

                return { lumpSum, installment, total: lumpSum + installment, categoryStats, cardStats };
            };

            const currentStats = getMonthStats(currentYear, currentMonth);
            const nextStats = getMonthStats(nextYearNum, nextMonthNum);

            const total = currentStats.total;
            const lumpSumRatio = total > 0 ? (currentStats.lumpSum / total) * 100 : 0;
            const installmentRatio = total > 0 ? (currentStats.installment / total) * 100 : 0;

            const categoryItems = Object.entries(currentStats.categoryStats)
                .filter(([_, value]) => value > 0)
                .sort((a, b) => b[1] - a[1]);

            const cardItems = Object.entries(currentStats.cardStats)
                .sort((a, b) => b[1] - a[1]);

            const CATEGORY_STYLES = ['#FF6B00', '#FF8C33', '#FFAE66', '#222222', '#555555', '#888888', '#bbbbbb', '#FFC899', '#FFE6D0', '#E5E5E7'];
            const CAT_COLORS = {};
            categories.forEach((cat, idx) => {
                CAT_COLORS[cat] = CATEGORY_STYLES[idx % CATEGORY_STYLES.length];
            });

            const totalCategoryAmount = Math.max(total, 1);
            let currentRotation = -90; 

            return (
                <div className="min-h-screen pb-32 bg-surface">
                    <TopAppBar title="My Square" />
                    <main className="pt-24 px-6 max-w-md mx-auto space-y-12">
                        <section className="space-y-2">
                            <p className="text-on-surface-variant font-semibold text-xs uppercase tracking-[0.15em]">이번 달 예정 지출</p>
                            <div className="flex items-baseline gap-1">
                                <span className="text-primary font-bold text-2xl self-start mt-2">₩</span>
                                <h1 className="text-primary font-extrabold text-5xl tracking-tighter">{formatCurrency(currentStats.total)}</h1>
                            </div>
                            <div className="pt-8 space-y-1">
                                <p className="text-on-surface-variant font-semibold text-xs uppercase tracking-[0.15em]">다음 달 예상 지출</p>
                                <p className="text-primary/60 font-bold text-3xl tracking-tight">₩{formatCurrency(nextStats.total)}</p>
                            </div>
                        </section>

                        <section className="space-y-6">
                            <div className="flex justify-between items-center">
                                <h2 className="text-on-surface font-extrabold text-xl">카테고리별 지출</h2>
                                <div className="bg-surface-container-high px-3 py-1 rounded-full flex items-center gap-1.5">
                                    <span className="w-2 h-2 rounded-full bg-primary"></span>
                                    <span className="text-[10px] font-bold text-on-surface-variant tracking-wider uppercase">{currentMonth + 1}월 지출 분석</span>
                                </div>
                            </div>
                            <div className="bg-white rounded-[2rem] p-6 shadow-sm border border-outline-variant flex flex-col items-center">
                                <div className="relative w-48 h-48 mb-8">
                                    <svg className="w-full h-full transform" viewBox="0 0 100 100">
                                        <circle cx="50" cy="50" fill="transparent" r="40" stroke="#f4f4f6" strokeWidth="12"></circle>
                                        {categoryItems.map(([cat, val]) => {
                                            const ratio = val / totalCategoryAmount;
                                            const circumference = 251.327;
                                            const dashoffset = circumference - (circumference * ratio) + 0.1;
                                            const rotation = currentRotation;
                                            currentRotation += (ratio * 360);
                                            return (
                                                <circle 
                                                    key={cat}
                                                    className="donut-segment" 
                                                    cx="50" cy="50" fill="transparent" r="40" 
                                                    stroke={CAT_COLORS[cat] || '#000'} 
                                                    strokeDasharray={251.327} 
                                                    strokeDashoffset={dashoffset} 
                                                    strokeWidth="12" 
                                                    style={{transformOrigin: 'center', transform: `rotate(${rotation}deg)`}}>
                                                </circle>
                                            );
                                        })}
                                    </svg>
                                    <div className="absolute inset-0 flex flex-col items-center justify-center text-center">
                                        <span className="text-on-surface-variant text-[10px] font-bold uppercase tracking-widest">총액</span>
                                        <span className="text-on-surface font-extrabold text-2xl">₩{(currentStats.total / 1000).toFixed(0)}k</span>
                                    </div>
                                </div>
                                <div className="grid grid-cols-2 gap-x-8 gap-y-4 w-full">
                                    {categoryItems.map(([cat, val]) => (
                                        <div key={cat} className="flex items-center gap-2">
                                            <div className="w-3 h-3 rounded-full" style={{backgroundColor: CAT_COLORS[cat] || '#767683'}}></div>
                                            <div className="flex flex-col">

                                                    setCards(cards.map(card => card.id === c.id ? {...card, nickname: editCardNickname} : card));
                                                    setEditingCardId(null);
                                                }} className="text-primary font-bold text-xs bg-primary/10 px-2 py-1.5 rounded hover:bg-primary/20">저장</button>
                                                <button onClick={() => setEditingCardId(null)} className="text-on-surface-variant font-bold text-xs bg-surface-container px-2 py-1.5 rounded hover:bg-surface-container-high">취소</button>
                                            </div>
                                        ) : (
                                            <div className="flex items-center gap-1">
                                                <button onClick={() => { setEditingCardId(c.id); setEditCardNickname(c.nickname || ''); }} className="material-symbols-outlined text-on-surface-variant text-[16px] p-1.5 rounded-full hover:bg-surface-container hover:text-primary transition-all">edit</button>
                                                <button onClick={() => { setCards(cards.filter(card => card.id !== c.id)) }} className="material-symbols-outlined text-on-surface-variant text-[16px] p-1.5 rounded-full hover:bg-surface-container hover:text-red-500 transition-all">delete</button>
                                            </div>
                                        )}
                                    </div>
                                ))}
                                
                                {isAddingCard && (
                                    <div className="bg-surface-container-lowest p-4 rounded-xl border border-primary/20 shadow-sm space-y-3">
                                        <div className="space-y-2">
                                            <input value={newCardName} onChange={e => setNewCardName(e.target.value)} placeholder="카드명 (예: 삼성 탭탭)" className="w-full text-sm px-3 py-2 rounded-lg bg-surface-container border-none focus:ring-2 focus:ring-primary/20" autoFocus />
                                            <input value={newCardNickname} onChange={e => setNewCardNickname(e.target.value)} placeholder="닉네임 (선택 사항)" className="w-full text-sm px-3 py-2 rounded-lg bg-surface-container border-none focus:ring-2 focus:ring-primary/20" onKeyDown={e => { if(e.key === 'Enter') { if (!newCardName) return; setCards([...cards, { id: 'c'+Date.now(), name: newCardName, nickname: newCardNickname }]); setNewCardName(''); setNewCardNickname(''); setIsAddingCard(false); } }} />
                                        </div>
                                        <div className="flex gap-2 justify-end pt-1">
                                            <button onClick={() => setIsAddingCard(false)} className="px-3 py-1.5 rounded-lg text-xs font-bold text-on-surface-variant bg-surface-container hover:bg-surface-container-high transition-colors">취소</button>
                                            <button onClick={() => {
                                                if (!newCardName) return;
                                                setCards([...cards, { id: 'c'+Date.now(), name: newCardName, nickname: newCardNickname }]);
                                                setNewCardName(''); setNewCardNickname(''); setIsAddingCard(false);
                                            }} className="px-3 py-1.5 rounded-lg text-xs font-bold text-on-primary bg-primary hover:opacity-90 transition-colors">등록하기</button>
                                        </div>
                                    </div>
                                )}
                            </div>
                        </section>

                        <section className="mb-12 pt-8 border-t border-outline-variant/10">
                            <div className="flex justify-between items-center mb-4">
                                <h2 className="text-on-surface font-extrabold text-xl">카테고리 관리</h2>
                                <button onClick={() => setIsAddingCategory(true)} className="text-primary font-bold text-xs bg-surface-container-high px-3 py-1 rounded-full hover:bg-surface-container-highest transition-colors">+ 추가</button>
                            </div>
                            
                            <div className="flex flex-wrap gap-2">
                                {categories.map((cat, idx) => (
                                    <div key={idx} className="flex items-center gap-1 bg-surface-container-lowest px-3 py-1.5 rounded-full border border-outline-variant/20 shadow-sm transition-all hover:bg-surface-container-high">
                                        <span className="text-sm text-on-surface font-semibold">{cat}</span>
                                        <button onClick={() => setCategories(categories.filter(c => c !== cat))} className="material-symbols-outlined text-on-surface-variant text-[16px] hover:text-red-500 rounded-full transition-colors ml-1 leading-none p-0.5">close</button>
                                    </div>
                                ))}
                            </div>
                            {isAddingCategory && (
                                <div className="mt-4 bg-surface-container-lowest p-4 rounded-xl border border-primary/20 shadow-sm space-y-3 animate-in fade-in duration-200">
                                    <input value={newCategory} onChange={e => setNewCategory(e.target.value)} placeholder="새 카테고리명 (예: 의료비)" className="w-full text-sm px-3 py-2 rounded-lg bg-surface-container border-none focus:ring-2 focus:ring-primary/20" autoFocus onKeyDown={e => { if(e.key === 'Enter') { if(!newCategory.trim() || categories.includes(newCategory.trim())) return; setCategories([...categories, newCategory.trim()]); setNewCategory(''); setIsAddingCategory(false); } }} />
                                    <div className="flex gap-2 justify-end pt-1">
                                        <button onClick={() => setIsAddingCategory(false)} className="px-3 py-1.5 rounded-lg text-xs font-bold text-on-surface-variant bg-surface-container hover:bg-surface-container-high transition-colors">취소</button>
                                        <button onClick={() => { if(!newCategory.trim() || categories.includes(newCategory.trim())) return; setCategories([...categories, newCategory.trim()]); setNewCategory(''); setIsAddingCategory(false); }} className="px-3 py-1.5 rounded-lg text-xs font-bold text-on-primary bg-primary hover:opacity-90 transition-colors">등록하기</button>
                                    </div>
                                </div>
                            )}
                        </section>


                    </main>
                    <BottomNavBar />
                </div>
            );
        };

        // Screen 4: Add Expense
        const AddExpensePage = () => {
            const { addExpense, cards, categories } = useContext(DataContext);
            const [amountStr, setAmountStr] = useState("");
            const [title, setTitle] = useState("");
            const [date, setDate] = useState(new Date().toISOString().split('T')[0]);
            const [card, setCard] = useState(cards.length > 0 ? cards[0].name : "");
            const [category, setCategory] = useState(categories.length > 0 ? categories[0] : "식비");
            const [isInstallment, setIsInstallment] = useState(true);
            const [months, setMonths] = useState(3);
            const navigate = useNavigate();

            const handleDigit = (digit) => {
                if (digit === "00" && (!amountStr || amountStr === "0")) return;
                setAmountStr(prev => {
                    let raw = prev.replace(/,/g, '');
                    if (raw === "0") raw = "";
                    const nextRaw = raw + digit;
                    if (nextRaw.length > 10) return prev;
                    return formatCurrency(parseInt(nextRaw));
                });
            };

            const handleBackspace = () => {
                setAmountStr(prev => {
                    let raw = prev.replace(/,/g, '');
                    if (raw.length <= 1) return "";
                    return formatCurrency(parseInt(raw.slice(0, -1)));
                });
            };

            const handleSubmit = () => {
                const amount = parseInt(amountStr.replace(/,/g, '')) || 0;
                if (amount <= 0 || !title) return; // Basic validation
                
                addExpense({
                    id: Date.now().toString(),
                    title,
                    amount,
                    date,
                    card,
                    category,
                    isInstallment,
                    months: isInstallment ? parseInt(months) : 1,
                    monthlyAmount: isInstallment ? Math.floor(amount / parseInt(months)) : amount
                });
                navigate('/');
            };

            const rawAmount = parseInt(amountStr.replace(/,/g, '')) || 0;
            const expectedMonthly = isInstallment ? Math.floor(rawAmount / months) : rawAmount;

            return (
                <div className="min-h-screen pb-32 bg-surface">
                    <TopAppBar title="지출 관리" showBack={true} />
                    <main className="pt-24 px-6 max-w-md mx-auto space-y-8">
                        <section className="space-y-6">
                            <div className="text-center">
                                <p className="text-on-surface-variant font-semibold text-xs mb-1">지출 금액</p>
                                <div className="flex items-baseline justify-center gap-1">
                                    <span className="text-primary font-bold text-2xl">₩</span>
                                    <span className="text-primary font-extrabold text-5xl tracking-tight">{amountStr || "0"}</span>
                                </div>
                            </div>
                            <div className="bg-surface-container rounded-3xl p-5 space-y-4">
                                <div className="space-y-1">
                                    <label className="text-[10px] uppercase tracking-widest text-on-surface-variant font-bold px-1">항목명</label>
                                    <input 
                                        className="w-full bg-surface-container-lowest border-none rounded-2xl p-4 font-semibold text-on-surface focus:ring-2 focus:ring-primary/20" 
                                        placeholder="맥북 프로 14'" 
                                        type="text"
                                        value={title}
                                        onChange={(e) => setTitle(e.target.value)}
                                    />
                                </div>
                                <div className="grid grid-cols-2 gap-3">
                                    <div className="space-y-1">
                                        <label className="text-[10px] uppercase tracking-widest text-on-surface-variant font-bold px-1">결제일</label>
                                        <div className="relative">
                                            <input 
                                                className="w-full bg-surface-container-lowest border-none rounded-2xl p-4 font-semibold text-on-surface text-sm" 
                                                type="date" 
                                                value={date}
                                                onChange={(e) => setDate(e.target.value)}
                                            />
                                        </div>
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-[10px] uppercase tracking-widest text-on-surface-variant font-bold px-1">결제 카드</label>
                                        <div className="relative">
                                            <select 
                                                className="w-full bg-surface-container-lowest border-none rounded-2xl p-4 font-semibold text-on-surface text-sm appearance-none pr-8"
                                                value={card}
                                                onChange={(e) => setCard(e.target.value)}
                                            >
                                                {cards.map(c => (
                                                    <option key={c.id} value={c.name}>{c.nickname ? `${c.name} (${c.nickname})` : c.name}</option>
                                                ))}
                                            </select>
                                            <span className="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant text-base pointer-events-none">expand_more</span>
                                        </div>
                                    </div>
                                    <div className="space-y-1 col-span-2">
                                        <label className="text-[10px] uppercase tracking-widest text-on-surface-variant font-bold px-1">카테고리</label>
                                        <div className="relative">
                                            <select 
                                                className="w-full bg-surface-container-lowest border-none rounded-2xl p-4 font-semibold text-on-surface text-sm appearance-none pr-8"
                                                value={category}
                                                onChange={(e) => setCategory(e.target.value)}
                                            >
                                                {categories.map(cat => <option key={cat} value={cat}>{cat}</option>)}
                                            </select>
                                            <span className="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant text-base pointer-events-none">expand_more</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </section>

                        {isInstallment && (
                            <section className="space-y-6 animate-in fade-in slide-in-from-top-4 duration-300">
                                <div className="bg-primary text-on-primary rounded-3xl p-6 relative overflow-hidden shadow-lg shadow-primary/20">
                                    <div className="relative z-10 flex justify-between items-center">
                                        <div>
                                            <p className="text-[10px] uppercase tracking-widest text-on-primary/60 font-bold mb-1">총 할부 금액</p>
                                            <h3 className="font-bold text-2xl">₩ {formatCurrency(rawAmount)}</h3>
                                        </div>
                                        <div className="text-right">
                                            <p className="text-[10px] uppercase tracking-widest text-on-primary/60 font-bold mb-1">할부 기간</p>
                                            <div className="flex items-center justify-end gap-1">
                                                <select 
                                                    className="bg-transparent text-2xl font-bold appearance-none text-right focus:outline-none"
                                                    value={months}
                                                    onChange={(e) => setMonths(Number(e.target.value))}
                                                >
                                                    {[2,3,4,5,6,10,12,24].map(m => <option key={m} value={m} className="text-black">{m}</option>)}
                                                </select>
                                                <span className="text-xs font-semibold opacity-70">개월</span>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </section>
                        )}
                        <section className="pt-4">
                            <div className="grid grid-cols-3 gap-0.5 bg-outline-variant/20 rounded-3xl overflow-hidden">
                                {[1,2,3,4,5,6,7,8,9, "00", 0].map(n => (
                                    <button key={n} onClick={() => handleDigit(n.toString())} className="aspect-[4/3] bg-surface-container-lowest active:bg-surface-container-high text-2xl font-bold transition-colors">{n}</button>
                                ))}
                                <button onClick={handleBackspace} className="aspect-[4/3] bg-surface-container-lowest active:bg-surface-container-high flex items-center justify-center">
                                    <span className="material-symbols-outlined text-on-surface-variant">backspace</span>
                                </button>
                            </div>
                        </section>
                        <section className="pb-12">
                            <button 
                                onClick={handleSubmit} 
                                disabled={!title || rawAmount <= 0}
                                className={`w-full py-5 rounded-full font-bold text-lg shadow-xl shadow-primary/20 active:scale-[0.98] transition-all flex items-center justify-center gap-2 ${(!title || rawAmount <= 0) ? 'bg-surface-variant text-on-surface-variant' : 'bg-primary text-on-primary'}`}
                            >
                                <span>지출 등록하기</span>
                                <span className="material-symbols-outlined text-[20px]">add_circle</span>
                            </button>
                        </section>
                    </main>
                    <BottomNavBar />
                </div>
            );
        };

        const App = () => {
            return (
                <DataProvider>
                    <MemoryRouter>
                        <Routes>
                            <Route path="/" element={<DashboardPage />} />
                            <Route path="/timeline" element={<TimelinePage />} />
                            <Route path="/asset" element={<AssetPage />} />
                            <Route path="/archive" element={<ArchivePage />} />
                            <Route path="/add-expense" element={<AddExpensePage />} />
                        </Routes>
                    </MemoryRouter>
                </DataProvider>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').then(registration => {
                    console.log('SW registered successfully');
                }).catch(error => {
                    console.log('SW registration failed:', error);
                });
            });
        }
    </script>
</body>
</html>
